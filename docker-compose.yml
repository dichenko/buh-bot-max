services:
  postgres:
    image: postgres:16-alpine
    container_name: buh-bot-max-postgres
    restart: unless-stopped
    command: postgres -c timezone=${BOT_TIMEZONE:-Europe/Moscow}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buh_bot}
      POSTGRES_USER: ${POSTGRES_USER:-buh_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buh_bot} -d ${POSTGRES_DB:-buh_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: ./bot
    container_name: buh-bot-max-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BOT_PORT:-3003}:8080"
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      BOT_SUBDOMAIN: ${BOT_SUBDOMAIN}
      PORT: 8080
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_IDS: ${ADMIN_IDS}
      BOT_TIMEZONE: ${BOT_TIMEZONE}
      WORK_START: ${WORK_START}
      WORK_END: ${WORK_END}
      REQUEST_COOLDOWN_MINUTES: ${REQUEST_COOLDOWN_MINUTES}
      MAX_REQUEST_COUNT: ${MAX_REQUEST_COUNT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      TOKEN_MEGAPLAN: ${TOKEN_MEGAPLAN}
      URL_MEGAPLAN: ${URL_MEGAPLAN}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    container_name: buh-bot-max-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
      BOT_TIMEZONE: ${BOT_TIMEZONE:-Europe/Moscow}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      MAX_API_BASE_URL: ${MAX_API_BASE_URL:-https://platform-api.max.ru}
      MAX_API_TIMEOUT_SECONDS: ${MAX_API_TIMEOUT_SECONDS:-30}
      MAX_API_RETRIES: ${MAX_API_RETRIES:-5}
      MAX_API_RETRY_DELAY_SECONDS: ${MAX_API_RETRY_DELAY_SECONDS:-2}
      MAX_ATTACHMENT_READY_RETRY_DELAY_SECONDS: ${MAX_ATTACHMENT_READY_RETRY_DELAY_SECONDS:-1}
      TOKEN_MEGAPLAN: ${TOKEN_MEGAPLAN}
      URL_MEGAPLAN: ${URL_MEGAPLAN}
      MEGAPLAN_RESPONSIBLE_ID: ${MEGAPLAN_RESPONSIBLE_ID:-1000038}
      MEGAPLAN_AUDITOR_IDS: ${MEGAPLAN_AUDITOR_IDS:-1000003,1000019,1000038}
      MEGAPLAN_DEADLINE_DAYS: ${MEGAPLAN_DEADLINE_DAYS:-14}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
      WORKER_IDLE_LOG_INTERVAL_SECONDS: ${WORKER_IDLE_LOG_INTERVAL_SECONDS:-60}
      WORKER_TEMPLATES_DIR: ${WORKER_TEMPLATES_DIR:-/app/templates}
      WORKER_OUTPUT_DIR: ${WORKER_OUTPUT_DIR:-/app/obrazec}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./worker/output:/app/obrazec

  pgadmin:
    image: dpage/pgadmin4:9.14
    container_name: buh-bot-max-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_SUBDOMAIN: ${PGADMIN_SUBDOMAIN}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5051}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pg_data:
  pgadmin_data:
